# ══════════════════════════════════════════════════════════════
#  render.yaml — Render Blueprint
#
#  Defines the rollup node service for automatic deployment.
#  Connect your GitHub repo to Render and it picks this up.
#
#  IMPORTANT: Render free plan only has 512MB RAM — a blockchain
#  node typically needs 1-2GB. Use the "Starter" plan ($7/mo)
#  or "Standard" plan for reliable hackathon demo.
# ══════════════════════════════════════════════════════════════

services:
  # ── Rollup Node ────────────────────────────────────────────
  - type: web
    name: battleq-rollup
    runtime: docker
    region: oregon
    plan: starter  # $7/mo — 1GB RAM, no sleep. Use "free" at your own risk.
    dockerfilePath: deploy/rollup/Dockerfile
    dockerContext: deploy/rollup

    # Render exposes this single port via HTTPS
    envVars:
      - key: PORT
        value: "10000"
      - key: MINITIA_HOME
        value: "/root/.minitia"

    # Health check hits the Caddy /healthz endpoint
    healthCheckPath: /healthz

    # Persistent disk for blockchain data (prevents data loss on redeploy)
    # Only available on Starter plan and above.
    disk:
      name: rollup-data
      mountPath: /root/.minitia/data
      sizeGB: 10
